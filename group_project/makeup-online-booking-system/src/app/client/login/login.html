<div class="login-page">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="petal p1">✿</div>
  <div class="petal p2">❀</div>
  <div class="petal p3">✾</div>
  <div class="petal p4">✿</div>

  <div class="login-container">

    <div class="brand">
      <div class="brand-icon">💄</div>
      <h1 class="brand-name">GlowBook</h1>
      <p class="brand-tagline">Makeup Online Booking System</p>
    </div>

    <div class="role-selector">
      <button class="role-btn active" (click)="goTo('client')">
        <span class="role-emoji">💄</span><span>Client</span>
      </button>
      <button class="role-btn" (click)="goTo('artist')">
        <span class="role-emoji">🎨</span><span>Artist</span>
      </button>
      <button class="role-btn" (click)="goTo('admin')">
        <span class="role-emoji">👑</span><span>Admin</span>
      </button>
    </div>

    <p class="role-welcome">Welcome back! Book your next glam session. ✨</p>

    <form (ngSubmit)="onLogin()" class="login-form">

      <div class="input-group">
        <span class="input-icon">✉</span>
        <input type="email" [(ngModel)]="email" name="email"
          placeholder="Email address" required />
      </div>

      <div class="input-group">
        <span class="input-icon">🔒</span>
        <input [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="password" name="password"
          placeholder="Password" required />
        <button type="button" class="toggle-pw" (click)="showPassword = !showPassword">
          {{ showPassword ? '🙈' : '👁' }}
        </button>
      </div>

      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe" />
          <span>Remember me</span>
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <p class="error-msg" *ngIf="errorMessage">⚠ {{ errorMessage }}</p>

      <button type="submit" class="btn-login" [disabled]="isLoading">
        <span>{{ isLoading ? 'Signing in...' : 'Sign In as Client' }}</span>
        <span class="btn-arrow" *ngIf="!isLoading">→</span>
      </button>

    </form>

    <button class="btn-guest" (click)="continueAsGuest()">
      <span class="guest-icon">👤</span>
      <span>Continue as Guest</span>
    </button>

    <div class="divider"><span>or</span></div>
    <p class="register-link">New here? <a routerLink="/client/register">Create an account</a></p>
    <p class="footer-note">✨ Beauty starts with a booking</p>

  </div>
</div>
