<div class="register-page">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="spark s1">✦</div>
  <div class="spark s2">✧</div>
  <div class="spark s3">✦</div>
  <div class="spark s4">✧</div>
  <div class="register-container">
    <div class="brand">
      <div class="brand-icon">🎨</div>
      <h1 class="brand-name">GlowBook</h1>
      <p class="brand-tagline">Join as a Makeup Artist</p>
    </div>
    <form (ngSubmit)="onRegister()" class="register-form">
      <div class="input-group">
        <span class="input-icon">👤</span>
        <input type="text" [(ngModel)]="name" name="name"
          placeholder="Full name" required />
      </div>
      <div class="input-group">
        <span class="input-icon">✉</span>
        <input type="email" [(ngModel)]="email" name="email"
          placeholder="Email address" required />
      </div>
      <div class="input-group">
        <span class="input-icon">📞</span>
        <input type="text" [(ngModel)]="phone" name="phone"
          placeholder="Phone number" required />
      </div>
      <div class="input-group">
        <span class="input-icon">💄</span>
        <input type="text" [(ngModel)]="specialty" name="specialty"
          placeholder="Your specialty (e.g. Bridal, SFX)" required />
      </div>
      <div class="input-group">
        <span class="input-icon">🔒</span>
        <input [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="password" name="password"
          placeholder="Password" required />
        <button type="button" class="toggle-pw" (click)="showPassword = !showPassword">
          {{ showPassword ? '🙈' : '👁' }}
        </button>
      </div>
      <div class="input-group">
        <span class="input-icon">🔒</span>
        <input [type]="showConfirm ? 'text' : 'password'"
          [(ngModel)]="confirmPassword" name="confirmPassword"
          placeholder="Confirm password" required />
        <button type="button" class="toggle-pw" (click)="showConfirm = !showConfirm">
          {{ showConfirm ? '🙈' : '👁' }}
        </button>
      </div>
      <p class="error-msg" *ngIf="errorMessage">⚠ {{ errorMessage }}</p>
      <p class="success-msg" *ngIf="successMessage">✅ {{ successMessage }}</p>
      <button type="submit" class="btn-register" [disabled]="isLoading">
        <span>{{ isLoading ? 'Creating account...' : 'Create Artist Account' }}</span>
        <span class="btn-arrow" *ngIf="!isLoading">→</span>
      </button>
    </form>
    <div class="divider"><span>or</span></div>
    <p class="login-link">Already have an account? <a routerLink="/artist/login">Sign in</a></p>
    <p class="footer-note">✦ Create beauty, inspire confidence</p>
  </div>
</div>
