<div class="login-page">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="spark s1">✦</div>
  <div class="spark s2">✧</div>
  <div class="spark s3">✦</div>
  <div class="spark s4">✧</div>

  <div class="login-container">

    <div class="brand">
      <div class="brand-icon">🎨</div>
      <h1 class="brand-name">GlowBook</h1>
      <p class="brand-tagline">Makeup Artist Portal</p>
    </div>

    <div class="role-selector">
      <button class="role-btn" (click)="goTo('client')">
        <span class="role-emoji">💄</span><span>Client</span>
      </button>
      <button class="role-btn active" (click)="goTo('artist')">
        <span class="role-emoji">🎨</span><span>Artist</span>
      </button>
      <button class="role-btn" (click)="goTo('admin')">
        <span class="role-emoji">👑</span><span>Admin</span>
      </button>
    </div>

    <p class="role-welcome">Hello, Artist! Manage your schedule & clients. 🎨</p>

    <form (ngSubmit)="onLogin()" class="login-form">

      <div class="input-group">
        <span class="input-icon">✉</span>
        <input type="email" [(ngModel)]="email" name="email"
          placeholder="Artist email" required />
      </div>

      <div class="input-group">
        <span class="input-icon">🔒</span>
        <input [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="password" name="password"
          placeholder="Password" required />
        <button type="button" class="toggle-pw" (click)="showPassword = !showPassword">
          {{ showPassword ? '🙈' : '👁' }}
        </button>
      </div>

      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe" />
          <span>Remember me</span>
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <p class="error-msg" *ngIf="errorMessage">⚠ {{ errorMessage }}</p>

      <button type="submit" class="btn-login" [disabled]="isLoading">
        <span>{{ isLoading ? 'Signing in...' : 'Sign In as Artist' }}</span>
        <span class="btn-arrow" *ngIf="!isLoading">→</span>
      </button>

    </form>

    <div class="divider"><span>or</span></div>
    <p class="register-link">New artist? <a routerLink="/artist/register">Apply here</a></p>
    <p class="footer-note">✦ Create beauty, inspire confidence</p>

  </div>
</div>
