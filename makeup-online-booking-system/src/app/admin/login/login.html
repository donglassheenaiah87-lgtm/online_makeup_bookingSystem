<div class="login-page">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="deco d1">◆</div>
  <div class="deco d2">◇</div>
  <div class="deco d3">◆</div>
  <div class="deco d4">◇</div>

  <div class="login-container">

    <div class="brand">
      <div class="brand-icon">👑</div>
      <h1 class="brand-name">GlowBook</h1>
      <p class="brand-tagline">Administrator Portal</p>
    </div>

    <div class="role-selector">
      <button class="role-btn" (click)="goTo('client')">
        <span class="role-emoji">💄</span><span>Client</span>
      </button>
      <button class="role-btn" (click)="goTo('artist')">
        <span class="role-emoji">🎨</span><span>Artist</span>
      </button>
      <button class="role-btn active" (click)="goTo('admin')">
        <span class="role-emoji">👑</span><span>Admin</span>
      </button>
    </div>

    <p class="role-welcome">Manage your entire GlowBook platform. 👑</p>

    <form (ngSubmit)="onLogin()" class="login-form">

      <div class="input-group">
        <span class="input-icon">✉</span>
        <input type="email" [(ngModel)]="email" name="email"
          placeholder="Admin email" required />
      </div>

      <div class="input-group">
        <span class="input-icon">🔒</span>
        <input [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="password" name="password"
          placeholder="Password" required />
        <button type="button" class="toggle-pw" (click)="showPassword = !showPassword">
          {{ showPassword ? '🙈' : '👁' }}
        </button>
      </div>

      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe" />
          <span>Remember me</span>
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <p class="error-msg" *ngIf="errorMessage">⚠ {{ errorMessage }}</p>

      <button type="submit" class="btn-login">
        <span>Sign In as Admin</span>
        <span class="btn-arrow">→</span>
      </button>

    </form>

    <div class="divider"><span>secure access</span></div>
    <p class="footer-note">👑 Authorized personnel only</p>

  </div>
</div>
